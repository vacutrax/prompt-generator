<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>Prompt Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-black: #000000;
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            --border-subtle: #2a2a2a;
            --border-light: #333333;
            --text-primary: #000000;
            --text-secondary: #333333;
            --text-muted: #666666;
            --text-white: #ffffff;
            --text-gray: #aaaaaa;
            --brand-green: #b8e64c;
            --brand-green-light: #d4f07a;
            --brand-green-dark: #9bc93a;
            --brand-green-glow: rgba(184, 230, 76, 0.3);
            --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.3);
            --shadow-medium: 0 4px 24px rgba(0, 0, 0, 0.4);
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-left: env(safe-area-inset-left, 0px);
            --safe-area-right: env(safe-area-inset-right, 0px);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', 'Inter', sans-serif;
            background: var(--bg-black);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
        }

        /* Header - Black */
        .header {
            padding: 14px 16px;
            padding-top: calc(14px + var(--safe-area-top));
            background: var(--bg-black);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
            position: relative;
        }

        .logo-text { display: flex; flex-direction: column; gap: 1px; }

        .logo-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--brand-green);
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .logo-subtitle {
            font-size: 10px;
            color: var(--text-gray);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .api-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-gray);
            font-weight: 600;
            background: var(--bg-card);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.4s ease;
            flex-shrink: 0;
        }

        .status-dot.ready {
            background: var(--brand-green);
            box-shadow: 0 0 8px var(--brand-green-glow);
        }

        .status-dot.pending {
            background: #f5a623;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .status-dot.error {
            background: #ff4466;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* Chat Container - Black Background */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            padding-bottom: calc(16px + var(--safe-area-bottom));
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-black);
            overscroll-behavior-y: contain;
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }
        .chat-container::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

        .message {
            max-width: 90%;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: messageIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            word-wrap: break-word;
            overflow-wrap: break-word;
            -webkit-hyphens: auto;
            hyphens: auto;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* User Messages - Green Bubble, Black Text */
        .user-message {
            align-self: flex-end;
            background: var(--brand-green);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 12px var(--brand-green-glow);
            font-weight: 600;
        }

        /* Bot Messages - Dark Gray Bubble, White Text */
        .bot-message {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-white);
            border: 1px solid var(--border-subtle);
            border-bottom-left-radius: 4px;
            max-width: 95%;
            box-shadow: var(--shadow-soft);
        }

        .response-text { white-space: pre-wrap; word-wrap: break-word; }
        .response-text p { margin-bottom: 12px; }
        .response-text p:last-child { margin-bottom: 0; }
        .response-text strong { color: var(--brand-green); font-weight: 700; }
        .response-text h1, .response-text h2, .response-text h3 {
            color: var(--text-white); margin: 16px 0 10px; font-weight: 700;
        }
        .response-text h1 { font-size: 18px; }
        .response-text h2 { font-size: 16px; }
        .response-text h3 { font-size: 14px; }
        .response-text ul, .response-text ol { margin-left: 20px; margin-bottom: 10px; }
        .response-text li { margin-bottom: 4px; color: var(--text-gray); }
        .response-text code {
            background: var(--bg-input); padding: 2px 6px; border-radius: 4px;
            font-family: 'SF Mono', 'Courier New', monospace; font-size: 12px;
            color: var(--brand-green); border: 1px solid var(--border-subtle);
            word-break: break-all;
        }
        .response-text pre {
            background: var(--bg-input); padding: 12px; border-radius: 10px;
            overflow-x: auto; margin: 8px 0; border: 1px solid var(--border-subtle);
            font-family: 'SF Mono', 'Courier New', monospace; font-size: 12px;
            line-height: 1.4; -webkit-overflow-scrolling: touch;
        }
        .response-text blockquote {
            border-left: 3px solid var(--brand-green); padding-left: 12px;
            margin: 8px 0; color: var(--text-gray); font-style: italic;
            background: var(--bg-input); padding: 8px 12px; border-radius: 0 8px 8px 0;
        }

        /* Suggested Improvements Box - Dark */
        .suggestions-box {
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 12px; padding: 16px; margin: 12px 0;
            position: relative;
            overflow: hidden;
        }
        .suggestions-box::before {
            content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
            width: 3px; border-radius: 2px;
            background: var(--brand-green);
        }
        .suggestions-box-title {
            color: var(--brand-green); font-weight: 700; font-size: 13px;
            margin-bottom: 10px; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 6px;
            padding-left: 8px;
        }
        .suggestions-box-title::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
            background: var(--brand-green); box-shadow: 0 0 6px var(--brand-green-glow);
        }
        .suggestion-item {
            color: var(--text-gray); font-size: 13px;
            line-height: 1.5; margin-bottom: 6px; padding-left: 16px; position: relative;
        }
        .suggestion-item::before {
            content: '+'; position: absolute; left: 0;
            color: var(--brand-green); font-weight: 700;
        }
        .suggestion-item:last-child { margin-bottom: 0; }

        /* Separator Line */
        .section-separator {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--border-light) 20%, var(--brand-green) 50%, var(--border-light) 80%, transparent 100%);
            margin: 16px 0; opacity: 0.6;
        }

        /* Best Prompt Box - Dark with Green Border */
        .best-prompt-box {
            background: var(--bg-input);
            border: 2px solid var(--brand-green);
            border-radius: 12px; padding: 16px; margin: 12px 0;
            position: relative;
            box-shadow: 0 0 20px rgba(184, 230, 76, 0.1);
        }
        .best-prompt-box::before {
            content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
            width: 3px; border-radius: 2px;
            background: var(--brand-green);
        }
        .best-prompt-title {
            color: var(--brand-green); font-weight: 700; font-size: 13px;
            margin-bottom: 10px; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 6px;
            padding-left: 8px;
        }
        .best-prompt-title::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
            background: var(--brand-green); box-shadow: 0 0 6px var(--brand-green-glow);
        }

        /* Code Block */
        .code-block {
            position: relative; background: var(--bg-input);
            border: 1px solid var(--border-subtle); border-radius: 10px;
            padding: 12px; margin: 8px 0;
            font-family: 'SF Mono', 'Courier New', monospace; font-size: 12px;
            color: var(--brand-green); overflow-x: auto; line-height: 1.4;
            -webkit-overflow-scrolling: touch;
        }
        .copy-btn-inline {
            position: absolute; top: 6px; right: 6px;
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            color: var(--text-gray); padding: 4px 10px; border-radius: 6px;
            font-size: 10px; cursor: pointer; transition: all 0.2s;
            opacity: 0; font-family: inherit; font-weight: 600;
        }
        .code-block:hover .copy-btn-inline { opacity: 1; }
        .copy-btn-inline:hover { background: var(--brand-green); color: var(--text-primary); border-color: var(--brand-green); }
        .copy-btn-inline.copied { background: var(--brand-green); color: var(--text-primary); border-color: var(--brand-green); }

        /* Typing Indicator - Dark */
        .typing-indicator {
            display: flex; gap: 5px; padding: 12px 14px;
            align-self: flex-start; background: var(--bg-card);
            border-radius: 14px; border-bottom-left-radius: 4px;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-soft);
        }
        .typing-indicator span {
            width: 7px; height: 7px; background: var(--brand-green);
            border-radius: 50%; animation: typing-bounce 1.4s infinite ease-in-out;
            box-shadow: 0 0 6px var(--brand-green-glow);
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing-bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input Area - Dark */
        .input-area {
            padding: 10px 12px;
            padding-bottom: calc(10px + var(--safe-area-bottom));
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-black);
            flex-shrink: 0;
            z-index: 100;
            position: relative;
        }

        .input-container {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-container input {
            width: 100%;
            height: 100%;
            min-height: 44px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text-white);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-container input:focus {
            border-color: var(--brand-green);
            box-shadow: 0 0 0 3px rgba(184, 230, 76, 0.1), inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .input-container input::placeholder { color: var(--text-muted); font-size: 14px; }
        .input-container input:disabled { opacity: 0.5; cursor: not-allowed; background: var(--border-subtle); }

        /* Generate Button - Green */
        .generate-btn-wrapper {
            position: relative;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .generate-btn-wrapper::before {
            content: ''; position: absolute; inset: -1px; border-radius: 13px;
            background: var(--brand-green);
            opacity: 0; transition: opacity 0.3s ease; z-index: 0; filter: blur(8px);
        }

        .generate-btn-wrapper:hover::before {
            opacity: 0.4; animation: glow-pulse 2s ease-in-out infinite;
        }

        .generate-btn-wrapper:active::before { opacity: 0.6; }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0.2; filter: blur(6px) brightness(1); }
            50% { opacity: 0.4; filter: blur(10px) brightness(1.2); }
        }

        .input-container button {
            position: relative; z-index: 1;
            background: var(--brand-green);
            border: none; color: var(--text-primary);
            padding: 10px 18px; border-radius: 12px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; font-family: inherit;
            letter-spacing: 0.5px; white-space: nowrap;
            min-height: 44px;
            box-shadow: 0 2px 12px var(--brand-green-glow);
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }

        .input-container button:hover:not(:disabled) {
            background: var(--brand-green-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--brand-green-glow);
        }

        .input-container button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 1px 6px var(--brand-green-glow);
        }

        .input-container button:disabled {
            background: var(--border-subtle); cursor: not-allowed; opacity: 0.6;
            box-shadow: none; color: var(--text-muted);
        }

        .meta-line {
            font-size: 10px; color: var(--text-muted); margin-top: 6px;
            font-weight: 500; letter-spacing: 0.5px;
        }

        /* Fallback Notice - Dark */
        .fallback-notice {
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            color: var(--text-gray);
            padding: 8px 12px; border-radius: 8px;
            margin-bottom: 10px; font-size: 12px; font-weight: 600;
            display: flex; align-items: center; gap: 6px;
        }
        .fallback-notice::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: #f5a623; flex-shrink: 0;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

        /* Mobile Landscape & Tablet */
        @media (min-width: 768px) {
            .header { padding: 16px 24px; padding-top: calc(16px + var(--safe-area-top)); }
            .logo-title { font-size: 22px; }
            .logo-subtitle { font-size: 11px; }
            .chat-container { padding: 24px; padding-bottom: calc(24px + var(--safe-area-bottom)); }
            .message { max-width: 80%; padding: 14px 18px; }
            .input-area { padding: 14px 20px; padding-bottom: calc(14px + var(--safe-area-bottom)); }
            .input-container input { padding: 12px 16px; font-size: 16px; }
            .input-container button { padding: 12px 24px; font-size: 15px; }
        }

        /* Desktop */
        @media (min-width: 1024px) {
            .header { padding: 18px 32px; padding-top: calc(18px + var(--safe-area-top)); }
            .chat-container { padding: 32px; padding-bottom: calc(32px + var(--safe-area-bottom)); gap: 16px; }
            .message { max-width: 75%; padding: 16px 20px; border-radius: 16px; }
            .input-area { padding: 16px 24px; padding-bottom: calc(16px + var(--safe-area-bottom)); }
            .input-container { gap: 12px; }
            .input-container input { padding: 14px 18px; border-radius: 14px; }
            .input-container button { padding: 14px 28px; border-radius: 14px; font-size: 15px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <div class="logo-text">
            <div class="logo-title">PromptGen</div>
            <div class="logo-subtitle">Context Assistant</div>
        </div>
        <div class="api-status" id="apiStatus">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Checking...</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message bot-message">
            <div class="response-text">
                <p>Hi there! I am ready to help you craft the perfect prompt. Just tell me what you want to create -- a website, a story, some code, an image concept, or anything else -- and I will generate a detailed, optimized prompt for you.</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Describe what you want to create..." disabled autocomplete="off" autocorrect="off" autocapitalize="off">
            </div>
            <div class="generate-btn-wrapper">
                <button id="sendBtn" disabled>Generate</button>
            </div>
        </div>
        <div class="meta-line" id="modelInfo"></div>
    </div>

    <script>
        (function() {
            var chatContainer = document.getElementById('chatContainer');
            var userInput = document.getElementById('userInput');
            var sendBtn = document.getElementById('sendBtn');
            var statusDot = document.getElementById('statusDot');
            var statusText = document.getElementById('statusText');
            var modelInfo = document.getElementById('modelInfo');
            var isGenerating = false;
            var API_BASE = window.location.origin;

            function enableInputs() {
                userInput.disabled = false;
                sendBtn.disabled = false;
                statusDot.className = 'status-dot ready';
                statusText.textContent = 'Ready';
                modelInfo.textContent = 'Connected to backend';
                userInput.focus();
            }

            function disableInputs() {
                userInput.disabled = true;
                sendBtn.disabled = true;
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Offline';
                modelInfo.textContent = 'Cannot connect to server';
            }

            async function checkHealth() {
                try {
                    var response = await fetch(API_BASE + '/api/health');
                    if (response.ok) {
                        enableInputs();
                        return true;
                    }
                } catch (e) {}
                disableInputs();
                return false;
            }

            function handleKeyPress(event) {
                if (event.key === 'Enter' && !isGenerating) sendMessage();
            }

            function addMessage(text, isUser) {
                var div = document.createElement('div');
                div.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
                if (isUser) div.textContent = text;
                else div.innerHTML = formatResponse(text);
                chatContainer.appendChild(div);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return div;
            }

            function formatResponse(text) {
                var html = escapeHtml(text);

                if (html.indexOf('Suggested Improvements') !== -1) {
                    html = html.replace(/\*\*Suggested Improvements\*\*/g, '<div class="suggestions-box"><div class="suggestions-box-title">Suggested Improvements</div>');
                    html = html.replace(/- (.*?)<br>/g, '<div class="suggestion-item">$1</div>');
                    html = html.replace(/- (.*?)<\/p>/g, '<div class="suggestion-item">$1</div>');
                }

                if (html.indexOf('Best Prompt') !== -1) {
                    html = html.replace(/\*\*Best Prompt\*\*/g, '<div class="section-separator"></div><div class="best-prompt-box"><div class="best-prompt-title">Best Prompt</div>');
                }

                if (html.indexOf('best-prompt-box') !== -1) {
                    html = html + '</div>';
                }

                html = html.replace(/<p>---<\/p>/g, '<div class="section-separator"></div>');
                html = html.replace(/<hr\s*\/?>/g, '<div class="section-separator"></div>');

                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                html = html.replace(/```([\s\S]*?)```/g, function(match, code) {
                    return '<div class="code-block"><button class="copy-btn-inline" onclick="copyCode(this)">Copy</button>' + escapeHtml(code) + '</div>';
                });
                html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
                html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
                html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
                html = html.replace(/^- (.*$)/gim, '<li>$1</li>');
                html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
                html = html.replace(/<\/ul>\n?<ul>/g, '');
                html = html.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
                html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
                html = html.replace(/\n\n/g, '</p><p>');
                html = html.replace(/\n/g, '<br>');
                if (!html.startsWith('<')) html = '<p>' + html + '</p>';
                return '<div class="response-text">' + html + '</div>';
            }

            function showTyping() {
                var div = document.createElement('div');
                div.className = 'typing-indicator';
                div.id = 'typingIndicator';
                div.innerHTML = '<span></span><span></span><span></span>';
                chatContainer.appendChild(div);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function removeTyping() {
                var indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove();
            }

            async function sendMessage() {
                var text = userInput.value.trim();
                if (!text || isGenerating) return;

                isGenerating = true;
                userInput.value = '';
                userInput.disabled = true;
                sendBtn.disabled = true;
                addMessage(text, true);
                showTyping();
                statusDot.className = 'status-dot pending';
                statusText.textContent = 'Generating...';

                try {
                    var response = await fetch(API_BASE + '/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userRequest: text })
                    });

                    var data = await response.json();
                    removeTyping();

                    var botDiv = document.createElement('div');
                    botDiv.className = 'message bot-message';

                    if (data.success && data.text) {
                        botDiv.innerHTML = formatResponse(data.text) +
                            '<div class="meta-line">Generated with ' + data.model + ' &bull; ' + new Date().toLocaleTimeString() + '</div>';
                    } else {
                        botDiv.innerHTML = '<div class="response-text">' +
                            '<div class="fallback-notice">Using basic optimization</div>' +
                            '<div class="suggestions-box"><div class="suggestions-box-title">Suggested Improvements</div>' +
                            '<div class="suggestion-item">Added specificity and constraints for better AI results</div>' +
                            '<div class="suggestion-item">Included output format and structure requirements</div>' +
                            '<div class="suggestion-item">Defined clear success criteria and examples</div></div>' +
                            '<div class="section-separator"></div>' +
                            '<div class="best-prompt-box"><div class="best-prompt-title">Best Prompt</div>' +
                            '<p><strong>Task:</strong> ' + escapeHtml(text) + '</p>' +
                            '<p>Please provide a detailed, comprehensive response with specific examples, clear structure, and actionable steps. Include any relevant technical requirements, constraints, and best practices. Format the output with clear headers and bullet points for readability.</p>' +
                            '</div></div>' +
                            '<div class="meta-line">Basic optimization &bull; ' + new Date().toLocaleTimeString() + '</div>';
                    }

                    chatContainer.appendChild(botDiv);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    statusDot.className = 'status-dot ready';
                    statusText.textContent = 'Ready';

                } catch (error) {
                    removeTyping();
                    var botDiv = document.createElement('div');
                    botDiv.className = 'message bot-message';
                    botDiv.innerHTML = '<div class="response-text">' +
                        '<div class="fallback-notice">Using basic optimization</div>' +
                        '<div class="suggestions-box"><div class="suggestions-box-title">Suggested Improvements</div>' +
                        '<div class="suggestion-item">Added specificity and constraints for better AI results</div>' +
                        '<div class="suggestion-item">Included output format and structure requirements</div>' +
                        '<div class="suggestion-item">Defined clear success criteria and examples</div></div>' +
                        '<div class="section-separator"></div>' +
                        '<div class="best-prompt-box"><div class="best-prompt-title">Best Prompt</div>' +
                        '<p><strong>Task:</strong> ' + escapeHtml(text) + '</p>' +
                        '<p>Please provide a detailed, comprehensive response with specific examples, clear structure, and actionable steps. Include any relevant technical requirements, constraints, and best practices. Format the output with clear headers and bullet points for readability.</p>' +
                        '</div></div>' +
                        '<div class="meta-line">Basic optimization &bull; ' + new Date().toLocaleTimeString() + '</div>';
                    chatContainer.appendChild(botDiv);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    statusDot.className = 'status-dot ready';
                    statusText.textContent = 'Ready';
                }

                isGenerating = false;
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }

            function escapeHtml(text) {
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function copyCode(btn) {
                var code = btn.parentElement.textContent.replace('Copy', '').trim();
                navigator.clipboard.writeText(code).then(function() {
                    btn.textContent = 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
                });
            }

            userInput.addEventListener('keypress', handleKeyPress);
            sendBtn.addEventListener('click', sendMessage);

            userInput.addEventListener('focus', function() {
                setTimeout(function() {
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }, 300);
            });

            checkHealth();
            setInterval(checkHealth, 30000);
        })();
    </script>
</body>
</html>
