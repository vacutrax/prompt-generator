<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0f14;
            --bg-secondary: #0f1620;
            --bg-tertiary: #16202e;
            --border-subtle: #1e2d3d;
            --border-glow: #2a3f55;
            --text-primary: #e0eaf0;
            --text-secondary: #94a8b8;
            --text-muted: #5a7080;
            --accent-turquoise: #00e5d4;
            --accent-turquoise-light: #4dfff0;
            --accent-turquoise-dark: #00b8a8;
            --accent-cyan: #00d4ff;
            --accent-green: #00ff88;
            --accent-green-light: #66ffb3;
            --accent-gold: #ffd700;
            --gradient-primary: linear-gradient(135deg, #00e5d4 0%, #00d4ff 50%, #00b8a8 100%);
            --gradient-glow: linear-gradient(135deg, rgba(0,229,212,0.3) 0%, rgba(0,212,255,0.3) 50%, rgba(0,184,168,0.3) 100%);
            --shadow-glow: 0 0 20px rgba(0,229,212,0.15), 0 0 40px rgba(0,212,255,0.1);
            --shadow-glow-strong: 0 0 30px rgba(0,229,212,0.25), 0 0 60px rgba(0,212,255,0.2), 0 0 90px rgba(0,184,168,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(15, 22, 32, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container { display: flex; align-items: center; gap: 16px; }
        .logo-icon { width: 44px; height: 44px; position: relative; }
        .logo-icon svg { width: 100%; height: 100%; filter: drop-shadow(0 0 10px rgba(0,229,212,0.4)); }
        .logo-text { display: flex; flex-direction: column; gap: 2px; }
        .logo-title {
            font-size: 22px; font-weight: 700;
            background: linear-gradient(135deg, #00e5d4 0%, #00d4ff 50%, #00b8a8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            letter-spacing: -0.5px; line-height: 1.1;
        }
        .logo-subtitle {
            font-size: 11px; color: var(--text-muted); letter-spacing: 2px;
            text-transform: uppercase; font-weight: 500;
        }

        .api-status { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-secondary); font-weight: 500; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted);
            box-shadow: 0 0 8px var(--text-muted); transition: all 0.4s ease;
        }
        .status-dot.ready { background: var(--accent-green); box-shadow: 0 0 12px rgba(0,255,136,0.6), 0 0 24px rgba(0,255,136,0.3); }
        .status-dot.pending { background: var(--accent-gold); box-shadow: 0 0 12px rgba(255,215,0,0.6); animation: pulse-dot 1.5s ease-in-out infinite; }
        .status-dot.error { background: #ff4466; box-shadow: 0 0 12px rgba(255,68,102,0.6); }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 32px;
            display: flex; flex-direction: column; gap: 20px;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0,229,212,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0,212,255,0.03) 0%, transparent 50%),
                var(--bg-primary);
        }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
        .chat-container::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }

        .message {
            max-width: 80%; padding: 16px 20px; border-radius: 16px;
            font-size: 14px; line-height: 1.6;
            animation: messageIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(0,229,212,0.12) 0%, rgba(0,212,255,0.08) 100%);
            border: 1px solid rgba(0,229,212,0.25); color: var(--text-primary);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 24px rgba(0,229,212,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .bot-message {
            align-self: flex-start; background: var(--bg-secondary);
            border: 1px solid var(--border-subtle); color: var(--text-primary);
            border-bottom-left-radius: 4px; max-width: 85%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        .response-text { white-space: pre-wrap; word-wrap: break-word; }
        .response-text p { margin-bottom: 14px; }
        .response-text p:last-child { margin-bottom: 0; }
        .response-text strong { color: var(--accent-turquoise-light); font-weight: 600; }
        .response-text h1, .response-text h2, .response-text h3 {
            color: var(--text-primary); margin: 20px 0 12px; font-weight: 600;
        }
        .response-text h1 { font-size: 18px; }
        .response-text h2 { font-size: 16px; }
        .response-text h3 { font-size: 14px; }
        .response-text ul, .response-text ol { margin-left: 24px; margin-bottom: 14px; }
        .response-text li { margin-bottom: 6px; color: var(--text-secondary); }
        .response-text code {
            background: var(--bg-tertiary); padding: 3px 8px; border-radius: 6px;
            font-family: 'SF Mono', 'Courier New', monospace; font-size: 12px;
            color: var(--accent-turquoise); border: 1px solid var(--border-subtle);
        }
        .response-text pre {
            background: var(--bg-tertiary); padding: 16px; border-radius: 12px;
            overflow-x: auto; margin: 12px 0; border: 1px solid var(--border-subtle);
            font-family: 'SF Mono', 'Courier New', monospace; font-size: 13px; line-height: 1.5;
        }
        .response-text blockquote {
            border-left: 3px solid var(--accent-turquoise); padding-left: 16px;
            margin: 12px 0; color: var(--text-secondary); font-style: italic;
        }

        /* Suggested Improvements Box */
        .suggestions-box {
            background: rgba(0, 255, 136, 0.04);
            border: 1px solid rgba(0, 255, 136, 0.12);
            border-radius: 12px; padding: 20px; margin: 16px 0;
        }
        .suggestions-box-title {
            color: var(--accent-green); font-weight: 600; font-size: 14px;
            margin-bottom: 12px; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 8px;
        }
        .suggestions-box-title::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-green); box-shadow: 0 0 8px rgba(0,255,136,0.5);
        }
        .suggestion-item {
            color: var(--accent-green-light); font-size: 13px;
            line-height: 1.5; margin-bottom: 8px; padding-left: 16px; position: relative;
        }
        .suggestion-item::before {
            content: '+'; position: absolute; left: 0;
            color: var(--accent-green); font-weight: 700;
        }
        .suggestion-item:last-child { margin-bottom: 0; }

        /* Separator Line */
        .section-separator {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--border-glow) 20%, var(--accent-turquoise) 50%, var(--border-glow) 80%, transparent 100%);
            margin: 24px 0; opacity: 0.6;
        }

        /* Best Prompt Box */
        .best-prompt-box {
            background: rgba(0, 229, 212, 0.03);
            border: 1px solid var(--border-glow); border-radius: 12px;
            padding: 20px; margin: 16px 0; position: relative;
        }
        .best-prompt-box::before {
            content: ''; position: absolute; left: 0; top: 12px; bottom: 12px;
            width: 3px; border-radius: 2px;
            background: linear-gradient(180deg, var(--accent-turquoise) 0%, var(--accent-cyan) 100%);
            opacity: 0.6;
        }
        .best-prompt-title {
            color: var(--accent-turquoise-light); font-weight: 600; font-size: 14px;
            margin-bottom: 12px; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 8px;
        }
        .best-prompt-title::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-turquoise); box-shadow: 0 0 8px rgba(0,229,212,0.5);
        }

        /* Code Block */
        .code-block {
            position: relative; background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle); border-radius: 12px;
            padding: 16px; margin: 12px 0;
            font-family: 'SF Mono', 'Courier New', monospace; font-size: 13px;
            color: var(--accent-green); overflow-x: auto; line-height: 1.5;
        }
        .copy-btn-inline {
            position: absolute; top: 8px; right: 8px;
            background: var(--border-subtle); border: 1px solid var(--border-glow);
            color: var(--text-secondary); padding: 4px 12px; border-radius: 6px;
            font-size: 11px; cursor: pointer; transition: all 0.2s; opacity: 0; font-family: inherit;
        }
        .code-block:hover .copy-btn-inline { opacity: 1; }
        .copy-btn-inline:hover { background: var(--border-glow); color: var(--text-primary); }
        .copy-btn-inline.copied { background: rgba(0,255,136,0.2); color: var(--accent-green); border-color: var(--accent-green); }

        /* Typing Indicator */
        .typing-indicator {
            display: flex; gap: 6px; padding: 16px 20px;
            align-self: flex-start; background: var(--bg-secondary);
            border-radius: 16px; border-bottom-left-radius: 4px;
            border: 1px solid var(--border-subtle);
        }
        .typing-indicator span {
            width: 8px; height: 8px; background: var(--accent-turquoise);
            border-radius: 50%; animation: typing-bounce 1.4s infinite ease-in-out;
            box-shadow: 0 0 8px rgba(0,229,212,0.5);
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing-bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-8px); opacity: 1; }
        }

        /* Input Area */
        .input-area {
            padding: 20px 32px; border-top: 1px solid var(--border-subtle);
            background: rgba(15, 22, 32, 0.8); backdrop-filter: blur(20px);
        }
        .input-container { display: flex; gap: 16px; align-items: stretch; }
        .input-wrapper { flex: 1; position: relative; }
        .input-container input {
            width: 100%; height: 100%; background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle); border-radius: 14px;
            padding: 14px 20px; color: var(--text-primary); font-size: 15px;
            outline: none; transition: all 0.3s ease; font-family: inherit;
        }
        .input-container input:focus {
            border-color: var(--accent-turquoise);
            box-shadow: 0 0 0 3px rgba(0,229,212,0.1), inset 0 1px 2px rgba(0,0,0,0.2);
        }
        .input-container input::placeholder { color: var(--text-muted); }
        .input-container input:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Generate Button - Blue Glass Style */
        .generate-btn-wrapper {
            position: relative; border-radius: 14px;
        }
        .generate-btn-wrapper::before {
            content: ''; position: absolute; inset: -2px; border-radius: 16px;
            background: linear-gradient(135deg, rgba(0,229,212,0.6) 0%, rgba(0,212,255,0.6) 50%, rgba(0,184,168,0.6) 100%);
            opacity: 0; transition: opacity 0.3s ease; z-index: 0; filter: blur(10px);
        }
        .generate-btn-wrapper:hover::before {
            opacity: 0.5; animation: glow-pulse 2s ease-in-out infinite;
        }
        .generate-btn-wrapper:active::before { opacity: 0.8; }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.3; filter: blur(8px) brightness(1); }
            50% { opacity: 0.6; filter: blur(14px) brightness(1.4); }
        }
        .input-container button {
            position: relative; z-index: 1;
            background: linear-gradient(135deg, rgba(0, 100, 200, 0.4) 0%, rgba(0, 150, 220, 0.3) 50%, rgba(0, 200, 220, 0.4) 100%);
            backdrop-filter: blur(20px); border: 1px solid rgba(0, 212, 255, 0.3);
            color: white; padding: 14px 28px; border-radius: 14px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; font-family: inherit;
            letter-spacing: 0.5px; white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0, 100, 200, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 0 20px rgba(0, 212, 255, 0.1);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .input-container button:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(0, 120, 220, 0.5) 0%, rgba(0, 170, 240, 0.4) 50%, rgba(0, 220, 240, 0.5) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 150, 220, 0.3), 0 0 40px rgba(0, 212, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.5);
        }
        .input-container button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(0, 100, 200, 0.2);
        }
        .input-container button:disabled {
            background: var(--border-subtle); cursor: not-allowed; opacity: 0.6;
            box-shadow: none; border-color: var(--border-subtle); text-shadow: none;
        }

        .meta-line {
            font-size: 11px; color: var(--text-muted); margin-top: 10px;
            font-weight: 500; letter-spacing: 0.5px;
        }

        /* Error Message - now hidden, we show fallback instead */
        .fallback-notice {
            background: rgba(0, 229, 212, 0.05);
            border: 1px solid rgba(0, 229, 212, 0.15);
            color: var(--accent-turquoise-light);
            padding: 10px 14px; border-radius: 8px;
            margin-bottom: 12px; font-size: 12px; font-weight: 500;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00e5d4;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#00b8a8;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <circle cx="22" cy="22" r="20" stroke="url(#logoGrad)" stroke-width="2" fill="none" />
                    <path d="M13 22 L19 28 L31 16" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                    <circle cx="22" cy="22" r="5" fill="url(#logoGrad)" opacity="0.25">
                        <animate attributeName="r" values="5;7;5" dur="2.5s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values="0.25;0.1;0.25" dur="2.5s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>
            <div class="logo-text">
                <div class="logo-title">PromptGen</div>
                <div class="logo-subtitle">Context Assistant</div>
            </div>
        </div>
        <div class="api-status" id="apiStatus">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Checking...</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message bot-message">
            <div class="response-text">
                <p>Hi there! I am ready to help you craft the perfect prompt. Just tell me what you want to create -- a website, a story, some code, an image concept, or anything else -- and I will generate a detailed, optimized prompt for you.</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Describe what you want to create..." disabled>
            </div>
            <div class="generate-btn-wrapper">
                <button id="sendBtn" disabled>Generate</button>
            </div>
        </div>
        <div class="meta-line" id="modelInfo"></div>
    </div>

    <script>
        (function() {
            var chatContainer = document.getElementById('chatContainer');
            var userInput = document.getElementById('userInput');
            var sendBtn = document.getElementById('sendBtn');
            var statusDot = document.getElementById('statusDot');
            var statusText = document.getElementById('statusText');
            var modelInfo = document.getElementById('modelInfo');
            var isGenerating = false;
            var API_BASE = window.location.origin;

            function enableInputs() {
                userInput.disabled = false;
                sendBtn.disabled = false;
                statusDot.className = 'status-dot ready';
                statusText.textContent = 'Ready';
                modelInfo.textContent = 'Connected to backend';
                userInput.focus();
            }

            function disableInputs() {
                userInput.disabled = true;
                sendBtn.disabled = true;
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Offline';
                modelInfo.textContent = 'Cannot connect to server';
            }

            async function checkHealth() {
                try {
                    var response = await fetch(API_BASE + '/api/health');
                    if (response.ok) {
                        enableInputs();
                        return true;
                    }
                } catch (e) {}
                disableInputs();
                return false;
            }

            function handleKeyPress(event) {
                if (event.key === 'Enter' && !isGenerating) sendMessage();
            }

            function addMessage(text, isUser) {
                var div = document.createElement('div');
                div.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
                if (isUser) div.textContent = text;
                else div.innerHTML = formatResponse(text);
                chatContainer.appendChild(div);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return div;
            }

            function formatResponse(text) {
                var html = escapeHtml(text);

                // Detect and wrap Suggested Improvements section
                if (html.indexOf('Suggested Improvements') !== -1) {
                    html = html.replace(/\*\*Suggested Improvements\*\*/g, '<div class="suggestions-box"><div class="suggestions-box-title">Suggested Improvements</div>');
                    // Convert bullet points to styled items
                    html = html.replace(/<div class="suggestions-box">([\s\S]*?)(?=<div class="section-separator">|<div class="best-prompt-box">|<hr|<p>---|<\/div><\/div>)/g, function(match, content) {
                        var items = content.replace(/- (.*?)<br>/g, '<div class="suggestion-item">$1</div>');
                        items = items.replace(/- (.*?)<\/p>/g, '<div class="suggestion-item">$1</div>');
                        return '<div class="suggestions-box"><div class="suggestions-box-title">Suggested Improvements</div>' + items + '</div>';
                    });
                }

                // Detect and wrap Best Prompt section
                if (html.indexOf('Best Prompt') !== -1) {
                    html = html.replace(/\*\*Best Prompt\*\*/g, '<div class="section-separator"></div><div class="best-prompt-box"><div class="best-prompt-title">Best Prompt</div>');
                }

                // Close best prompt box at end
                if (html.indexOf('best-prompt-box') !== -1 && html.indexOf('</div></div>') === -1) {
                    html = html + '</div>';
                }

                // Handle separator line
                html = html.replace(/<p>---<\/p>/g, '<div class="section-separator"></div>');
                html = html.replace(/<hr\s*\/?>/g, '<div class="section-separator"></div>');

                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                html = html.replace(/```([\s\S]*?)```/g, function(match, code) {
                    return '<div class="code-block"><button class="copy-btn-inline" onclick="copyCode(this)">Copy</button>' + escapeHtml(code) + '</div>';
                });
                html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
                html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
                html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
                html = html.replace(/^- (.*$)/gim, '<li>$1</li>');
                html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
                html = html.replace(/<\/ul>\n?<ul>/g, '');
                html = html.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
                html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
                html = html.replace(/\n\n/g, '</p><p>');
                html = html.replace(/\n/g, '<br>');
                if (!html.startsWith('<')) html = '<p>' + html + '</p>';
                return '<div class="response-text">' + html + '</div>';
            }

            function showTyping() {
                var div = document.createElement('div');
                div.className = 'typing-indicator';
                div.id = 'typingIndicator';
                div.innerHTML = '<span></span><span></span><span></span>';
                chatContainer.appendChild(div);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function removeTyping() {
                var indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove();
            }

            async function sendMessage() {
                var text = userInput.value.trim();
                if (!text || isGenerating) return;

                isGenerating = true;
                userInput.value = '';
                userInput.disabled = true;
                sendBtn.disabled = true;
                addMessage(text, true);
                showTyping();
                statusDot.className = 'status-dot pending';
                statusText.textContent = 'Generating...';

                try {
                    var response = await fetch(API_BASE + '/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userRequest: text })
                    });

                    var data = await response.json();
                    removeTyping();

                    // Always show result, never show error
                    var botDiv = document.createElement('div');
                    botDiv.className = 'message bot-message';

                    var content = '';
                    if (data.success && data.text) {
                        content = formatResponse(data.text);
                    } else {
                        // Fallback - format the user's request as a basic prompt
                        content = '<div class="response-text"><div class="fallback-notice">Using basic optimization (AI service temporarily unavailable)</div>' +
                            '<div class="suggestions-box"><div class="suggestions-box-title">Suggested Improvements</div>' +
                            '<div class="suggestion-item">Added specificity and constraints for better AI results</div>' +
                            '<div class="suggestion-item">Included output format and structure requirements</div>' +
                            '<div class="suggestion-item">Defined clear success criteria and examples</div></div>' +
                            '<div class="section-separator"></div>' +
                            '<div class="best-prompt-box"><div class="best-prompt-title">Best Prompt</div>' +
                            '<p><strong>Task:</strong> ' + escapeHtml(text) + '</p>' +
                            '<p>Please provide a detailed, comprehensive response with specific examples, clear structure, and actionable steps. Include any relevant technical requirements, constraints, and best practices. Format the output with clear headers and bullet points for readability.</p>' +
                            '</div></div>';
                    }

                    botDiv.innerHTML = content + '<div class="meta-line">Generated with ' + (data.model || 'fallback') + ' &bull; ' + new Date().toLocaleTimeString() + '</div>';
                    chatContainer.appendChild(botDiv);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    statusDot.className = 'status-dot ready';
                    statusText.textContent = 'Ready';

                } catch (error) {
                    removeTyping();
                    // NEVER show error - always show fallback
                    var botDiv = document.createElement('div');
                    botDiv.className = 'message bot-message';
                    botDiv.innerHTML = '<div class="response-text">' +
                        '<div class="fallback-notice">Using basic optimization (connection issue)</div>' +
                        '<div class="suggestions-box"><div class="suggestions-box-title">Suggested Improvements</div>' +
                        '<div class="suggestion-item">Added specificity and constraints for better AI results</div>' +
                        '<div class="suggestion-item">Included output format and structure requirements</div>' +
                        '<div class="suggestion-item">Defined clear success criteria and examples</div></div>' +
                        '<div class="section-separator"></div>' +
                        '<div class="best-prompt-box"><div class="best-prompt-title">Best Prompt</div>' +
                        '<p><strong>Task:</strong> ' + escapeHtml(text) + '</p>' +
                        '<p>Please provide a detailed, comprehensive response with specific examples, clear structure, and actionable steps. Include any relevant technical requirements, constraints, and best practices. Format the output with clear headers and bullet points for readability.</p>' +
                        '</div></div>' +
                        '<div class="meta-line">Basic optimization &bull; ' + new Date().toLocaleTimeString() + '</div>';
                    chatContainer.appendChild(botDiv);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    statusDot.className = 'status-dot ready';
                    statusText.textContent = 'Ready';
                }

                isGenerating = false;
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }

            function escapeHtml(text) {
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function copyCode(btn) {
                var code = btn.parentElement.textContent.replace('Copy', '').trim();
                navigator.clipboard.writeText(code).then(function() {
                    btn.textContent = 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
                });
            }

            userInput.addEventListener('keypress', handleKeyPress);
            sendBtn.addEventListener('click', sendMessage);

            checkHealth();
            setInterval(checkHealth, 30000);
        })();
    </script>
</body>
</html>
